name: EBI to S3 Relay
on:
  workflow_dispatch:
    inputs:
      dataset:
        description: 'Which dataset to relay'
        required: true
        type: choice
        options:
          - wes
          - wgs
          - aspera_test

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Install AWS CLI and pv
        run: |
          curl -sS "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          sudo apt-get update -y
          sudo apt-get install -y pv

      - name: Configure AWS profile
        run: |
          mkdir -p ~/.aws
          cat >> ~/.aws/credentials << EOF
          [dellcsc]
          aws_access_key_id = ${{ secrets.S3_ACCESS_KEY_ID }}
          aws_secret_access_key = ${{ secrets.S3_SECRET_ACCESS_KEY }}
          EOF
          cat >> ~/.aws/config << EOF
          [profile dellcsc]
          endpoint_url = ${{ secrets.S3_ENDPOINT }}
          s3 =
              payload_signing_enabled = false
              addressing_style = path
              max_queue_size = 10000
              multipart_chunksize = 128MB
              max_concurrent_requests = 32
              signature_version = s3v4
          request_checksum_calculation = when_required
          response_checksum_validation = when_required
          EOF
          chmod 600 ~/.aws/credentials ~/.aws/config

      - name: Relay WES FASTQ (EBI -> S3, streamed in parallel, no local disk)
        if: ${{ github.event.inputs.dataset == 'wes' }}
        run: |
          set -uo pipefail
          FILES=(
            "SRR789/000/SRR7890830/SRR7890830_1.fastq.gz"
            "SRR789/000/SRR7890830/SRR7890830_2.fastq.gz"
            "SRR789/006/SRR7890846/SRR7890846_1.fastq.gz"
            "SRR789/006/SRR7890846/SRR7890846_2.fastq.gz"
          )
          PIDS=()
          for f in "${FILES[@]}"; do
            name=$(basename "$f")
            (
              echo "=== Relaying $name ==="
              curl -sS -L --fail "https://ftp.sra.ebi.ac.uk/vol1/fastq/$f" | \
                pv -f -N "$name" -i 15 | \
                aws --profile dellcsc s3 cp - "s3://v89865/rtx6000_bench/fastq/wes/$name"
              echo "=== Done $name ==="
            ) &
            PIDS+=($!)
          done
          FAIL=0
          for pid in "${PIDS[@]}"; do
            wait "$pid" || FAIL=1
          done
          exit $FAIL

      - name: Relay WGS FASTQ (EBI -> S3, streamed in parallel, no local disk)
        if: ${{ github.event.inputs.dataset == 'wgs' }}
        run: |
          set -uo pipefail
          FILES=(
            "SRR789/004/SRR7890824/SRR7890824_1.fastq.gz"
            "SRR789/004/SRR7890824/SRR7890824_2.fastq.gz"
            "SRR789/007/SRR7890827/SRR7890827_1.fastq.gz"
            "SRR789/007/SRR7890827/SRR7890827_2.fastq.gz"
          )
          PIDS=()
          for f in "${FILES[@]}"; do
            name=$(basename "$f")
            (
              echo "=== Relaying $name ==="
              curl -sS -L --fail "https://ftp.sra.ebi.ac.uk/vol1/fastq/$f" | \
                pv -f -N "$name" -i 15 | \
                aws --profile dellcsc s3 cp - "s3://v89865/rtx6000_bench/fastq/wgs/$name"
              echo "=== Done $name ==="
            ) &
            PIDS+=($!)
          done
          FAIL=0
          for pid in "${PIDS[@]}"; do
            wait "$pid" || FAIL=1
          done
          exit $FAIL

      - name: Test Aspera (ascp) throughput vs HTTPS
        if: ${{ github.event.inputs.dataset == 'aspera_test' }}
        run: |
          set -uo pipefail
          echo "=== Installing Aspera Connect ==="
          curl -sSL -o aspera_installer.sh \
            "https://d3gcli72yxqn2z.cloudfront.net/downloads/connect/latest/bin/ibm-aspera-connect_4.2.12.780_linux_x86_64.sh" \
            || { echo "INSTALLER_DOWNLOAD_FAILED"; exit 1; }
          sh aspera_installer.sh || echo "INSTALLER_RUN_RETURNED_NONZERO"
          export PATH=$HOME/.aspera/connect/bin:$PATH
          which ascp || { echo "ASCP_NOT_FOUND_AFTER_INSTALL"; exit 1; }
          ascp --version

          KEY=$HOME/.aspera/connect/etc/asperaweb_id_dsa.openssh
          ls -la "$KEY" || echo "KEY_MISSING"

          echo "=== Timed ascp test (60s, capped rate 800Mbps target) ==="
          timeout 70 ascp -QT -l 800m -P33001 \
            -i "$KEY" \
            era-fasp@fasp.sra.ebi.ac.uk:/vol1/fastq/SRR789/000/SRR7890830/SRR7890830_1.fastq.gz \
            ./ascp_test_download.fastq.gz
          echo "ascp exit code: $?"
          echo "=== Result ==="
          ls -la ascp_test_download.fastq.gz 2>&1 || echo "NO FILE PRODUCED"

          echo "=== For comparison, 60s of plain curl+pv on the same file ==="
          timeout 60 bash -c '
            curl -sS -L "https://ftp.sra.ebi.ac.uk/vol1/fastq/SRR789/000/SRR7890830/SRR7890830_1.fastq.gz" | \
              pv -f -N "https_baseline" -i 10 > /dev/null
          ' || true

      - name: Verify uploaded sizes
        if: ${{ github.event.inputs.dataset == 'wes' || github.event.inputs.dataset == 'wgs' }}
        run: |
          aws --profile dellcsc s3 ls "s3://v89865/rtx6000_bench/fastq/${{ github.event.inputs.dataset }}/" --human-readable
